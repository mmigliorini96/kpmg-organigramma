    /* ── K11 · OPEN PLATFORM ───────────────────────────────────────── */
    {id:"k11", short:"Servizi continuativi: application management, cyber monitoring, fondi pubblici e adempimenti specialistici.", name:"K11 · Open Platform",
     desc:"Per capire K11 bisogna comprendere una distinzione fondamentale nel mondo della consulenza professionale. **Le altre entità lavorano per progetti**: un progetto ha un inizio, uno svolgimento e una fine — si implementa un sistema, si certifica un bilancio, si conclude un'acquisizione. **Open Platform invece lavora per servizi continuativi**: un servizio continuativo non finisce mai — qualcuno deve assicurarsi ogni giorno che i sistemi funzionino, che le scadenze vengano rispettate, che i processi non si inceppino. K11 rimane a fianco al cliente nel tempo, garantendo che quello che è stato costruito continui a funzionare e migliorare.",
     color:"#993556",
     children:[
      {id:"k11e", short:"Manutenzione ed evolutive di sistemi SAP, Oracle, ServiceNow e Microsoft già attivi.", name:"ERP · ERP Platforms",
       desc:"Quando un **sistema è già attivo**, il lavoro non finisce. Inizia una fase diversa, più continua e più vicina all'operatività quotidiana del cliente. Gli utenti segnalano **malfunzionamenti**, alcuni processi vanno adattati, cambiano le esigenze del business, arrivano nuove richieste normative. ERP lavora proprio su questo: segue piattaforme già in uso presso i clienti e le aiuta a **restare efficaci nel tempo**.",
       color:"#D4537E",
       children:[

        {id:"k11af", short:"Sviluppi tecnici SAP (interfacce, estensioni, integrazioni) per clienti industriali e commerciali.", name:"AF · SAP Tech CIM",       desc:"Lavora sempre su **SAP** nel mondo **industriale e commerciale**, ma sulla parte più tecnica della piattaforma. Qui il focus è su sviluppi, estensioni, interfacce e integrazioni con altri sistemi, cioè su tutte quelle attività che servono quando una richiesta non si risolve con una semplice modifica funzionale.",             color:"#ED93B1"},
        {id:"k11ap", short:"Sviluppi tecnici SAP per enti pubblici, sanità e amministrazioni.", name:"AP · SAP Tech PS",        desc:"Ha una logica simile a quella di SAP Tech CIM, ma applicata al **settore pubblico**. Il lavoro riguarda sviluppi, integrazioni e adeguamenti tecnici di SAP in contesti come enti pubblici, sanità e amministrazioni, tenendo conto dei vincoli specifici del mondo pubblico.",                                                    color:"#ED93B1"},
        {id:"k11ab", short:"SAP per banche e assicurazioni: supporto applicativo e tecnico continuativo.", name:"AB · AMS & Tech FS",      desc:"Nel **settore bancario e assicurativo** la gestione quotidiana del sistema e gli interventi più tecnici spesso si intrecciano. La solution lavora sui sistemi **SAP** sia dal lato applicativo sia da quello tecnico, in un contesto dove stabilità, tracciabilità e controlli sono particolarmente importanti.",                     color:"#ED93B1"},
        {id:"k11ca", short:"Manutenzione ed evolutive su piattaforme ServiceNow già attive.", name:"CA · AMS ServiceNow",     desc:"Segue le piattaforme **ServiceNow** già attive e lavora sui flussi che il cliente usa ogni giorno: modificare un workflow di approvazione, aggiungere un nuovo tipo di richiesta, aggiornare un processo HR o IT già digitalizzato oppure correggere un passaggio che non segue più il percorso corretto.",                                  color:"#ED93B1"},
        {id:"k11ct", short:"Dynamics 365 e Power Platform già in uso: correzioni, adattamenti ed evolutive.", name:"CT · Microsoft AMS & Tech",desc:"Lavora sui sistemi Microsoft già in uso, come **Dynamics 365** e **Power Platform**, quando il cliente non deve introdurre una nuova soluzione da zero ma far evolvere, correggere o adattare quelle che utilizza già. Il team interviene sia sul lato più operativo (problemi segnalati dagli utenti, flussi da adattare) sia sulla componente tecnica della piattaforma.",                   color:"#ED93B1"}
       ]},
      {id:"k11m", short:"Funzionamento continuo dei sistemi MES per la produzione manifatturiera.", name:"ME · AMS MES",               desc:"In una fabbrica moderna, le macchine sono collegate a sistemi informatici che monitorano in tempo reale ogni fase della produzione. Questi sistemi si chiamano **MES — Manufacturing Execution System** — e sono il sistema nervoso dell'impianto. Se si bloccano, si blocca la produzione. ME garantisce che non accada: presidia continuamente il funzionamento di questi sistemi, interviene in modo tempestivo su qualsiasi problema tecnico.",                          color:"#D4537E"},
      {id:"k11o", short:"Supporto quotidiano ai sistemi Oracle EPM per Finance e Controllo di Gestione.", name:"OA · Oracle EPM AMS & Tech", desc:"Chi si occupa di pianificazione finanziaria in una grande azienda — budget, previsioni, reporting mensile, bilancio consolidato — lavora ogni giorno con **sistemi Oracle EPM**. OA garantisce che questi sistemi funzionino correttamente: risolve i problemi tecnici che emergono nell'uso quotidiano, aggiorna i modelli di calcolo quando cambiano le esigenze dell'azienda.",                    color:"#D4537E"},
      {id:"k11s", short:"Monitoraggio continuo della sicurezza informatica, gestione degli incidenti e formazione.", name:"SR · Cyber & Tech Risk",     desc:"La sicurezza informatica non è un problema che si risolve una volta per tutte. SR presidia in modo permanente la sicurezza informatica dei clienti: **monitora i sistemi** per individuare vulnerabilità prima che vengano sfruttate, analizza le minacce in evoluzione, gestisce gli incidenti quando si verificano e forma il personale per ridurre i rischi legati al comportamento umano.",                     color:"#D4537E"},
      {id:"k11i", short:"Screening sistematici sull'affidabilità di partner, fornitori e clienti.", name:"IH · IDD Hub",               desc:"Prima di firmare un contratto, avviare una partnership o affidare un appalto, ogni organizzazione dovrebbe sapere con chi ha a che fare. IH svolge **screening sistematici sull'affidabilità** di partner, fornitori e clienti: analizza registri societari, dati finanziari, fonti giornalistiche e banche dati specializzate internazionali, producendo report dettagliati che evidenziano rischi di corruzione, riciclaggio, frodi o esposizione reputazionale.",                          color:"#D4537E"},
      {id:"k11p", short:"Gestione operativa continuativa di grandi progetti pubblici: PNRR, digitalizzazione PA, sanità.", name:"PM · PS Hub Consulting",     desc:"Digitalizzare la sanità di una regione, migrare al cloud i servizi di un ministero: sono **progetti enormi, che durano anni** e richiedono di coordinare decine di attori diversi. PM si occupa di questa fase: garantisce la continuità operativa dei grandi progetti pubblici già avviati, assicurando che procedano nel rispetto dei tempi, delle regole e degli obiettivi originari.",                   color:"#D4537E"},
      {id:"k11r", short:"Verifica ricorrente della rendicontazione dei fondi pubblici: conformità spese e documentazione.", name:"PR · PS Hub Risk",           desc:"Quando un ente pubblico riceve **fondi europei o nazionali**, deve dimostrare, a ogni controllo, che ogni euro è stato speso in modo corretto e documentato. PR supporta le amministrazioni in questa verifica ricorrente: analizza la documentazione amministrativa, finanziaria e tecnica e controlla la conformità alle normative europee e nazionali.",                  color:"#D4537E"},
      {id:"k11h", short:"Supporto burocratico ad aziende private per accedere a bandi e finanziamenti pubblici.", name:"PH · Private Sector Hub",    desc:"Ogni anno vengono messi a disposizione miliardi di euro in **finanziamenti pubblici** — europei, nazionali, regionali — a cui le aziende private potrebbero accedere. PH gestisce l'intero processo operativo per le aziende private che vogliono accedere a questi fondi: individua i bandi pertinenti, prepara la documentazione, verifica la conformità e segue la rendicontazione.",              color:"#D4537E"},
      {id:"k11b", short:"Analisi comparative di mercato ricorrenti a supporto del Transfer Pricing di K2.", name:"BM · Benchmarking Analysis", desc:"Quando un gruppo multinazionale vende prodotti o servizi tra le proprie filiali, deve applicare prezzi coerenti con quelli che applicherebbe a un cliente esterno. Questa regola si chiama **transfer pricing**. BM produce le analisi quantitative necessarie: raccoglie dati economico-finanziari da database specializzati, costruisce campioni di aziende comparabili e verifica che i prezzi applicati dal gruppo siano difendibili di fronte a un controllo fiscale.",                   color:"#D4537E"},
      {id:"k11g", short:"Adempimenti fiscali operativi per lavoratori in mobilità internazionale.", name:"GM · Global Mobility Analysis",desc:"Un dipendente che lavora un anno in Germania, poi sei mesi a Singapore, poi torna in Italia: per lui vanno preparate **dichiarazioni fiscali in più Paesi**, con dati precisi su redditi, contributi, giorni di presenza, benefit e rimborsi. GM si occupa di tutta la parte operativa: raccoglie i dati dai sistemi HR e payroll, li elabora, prepara i modelli fiscali e garantisce che tutto sia corretto e consegnato nei tempi.",                        color:"#D4537E"}
     ]}

  ] /* fine children di KPMG Italia */
}; /* fine DATA — non eliminare questa riga */

/* =====================================================================
   MOTORE D3 — NON MODIFICARE DA QUI IN POI
   ===================================================================== */
const NW=206, NH=50, DUR=500;
const svg=d3.select("#svg"), g=d3.select("#g");
function GW(){return svg.node().clientWidth;}
function GH(){return svg.node().clientHeight;}

const zoom=d3.zoom().scaleExtent([0.06,3]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom).on("dblclick.zoom",null);

const tree=d3.tree().nodeSize([NH+14,NW+70]);
const root=d3.hierarchy(DATA);
root.x0=0; root.y0=0;

function collapse(d){if(d.children){d._children=d.children;d._children.forEach(collapse);d.children=null;}}
root.children.forEach(collapse);

let uid=0;
function update(src){
  tree(root);
  const nodes=root.descendants(), links=root.links();

  const lk=g.selectAll("path.lnk").data(links,d=>d.target.data.id);
  const lkE=lk.enter().insert("path","g.nd").attr("class","lnk")
    .attr("stroke-opacity",.2).attr("stroke-width",1.5)
    .attr("d",()=>hcurve([src.y0+NW,src.x0],[src.y0+NW,src.x0]));
  lkE.merge(lk).attr("stroke",d=>d.source.data.color)
    .transition().duration(DUR).ease(d3.easeCubicInOut)
    .attr("d",d=>hcurve([d.source.y+NW,d.source.x],[d.target.y,d.target.x]));
  lk.exit().transition().duration(DUR).ease(d3.easeCubicInOut)
    .attr("d",()=>hcurve([src.y+NW,src.x],[src.y+NW,src.x])).remove();

  const nd=g.selectAll("g.nd").data(nodes,d=>d.data.id||(d.data.id="u"+(++uid)));
  const ndE=nd.enter().append("g").attr("class","nd")
    .attr("transform",`translate(${src.y0},${src.x0})`).attr("opacity",0)
    .on("click",(e,d)=>{e.stopPropagation();toggle(d);openSidebar(d);})
    .on("mouseenter",(e,d)=>showP(d))
    .on("mouseleave",hideP);

  ndE.append("clipPath").attr("id",d=>"cp"+d.data.id)
    .append("rect").attr("x",0).attr("y",-NH/2).attr("width",NW).attr("height",NH).attr("rx",7);

  const ig=ndE.append("g").attr("clip-path",d=>`url(#cp${d.data.id})`);
  ig.append("rect").attr("class",d=>d.depth===0?"":"nbg")
    .attr("x",0).attr("y",-NH/2).attr("width",NW).attr("height",NH)
    .attr("fill",d=>d.depth===0?d.data.color:"#fff");
  ig.filter(d=>d.depth>0).append("rect")
    .attr("x",0).attr("y",-NH/2).attr("width",6).attr("height",NH)
    .attr("fill",d=>d.data.color);

  ndE.filter(d=>d.depth>0).append("rect")
    .attr("x",0).attr("y",-NH/2).attr("width",NW).attr("height",NH).attr("rx",7)
    .attr("fill","none").attr("stroke",d=>d.data.color).attr("stroke-width",1.5).attr("stroke-opacity",.3);

  ndE.append("text")
    .attr("x",d=>d.depth===0?NW/2:17).attr("y",d=>d.depth===0?0:-7)
    .attr("dominant-baseline",d=>d.depth===0?"middle":"auto")
    .attr("text-anchor",d=>d.depth===0?"middle":"start")
    .attr("fill",d=>d.depth===0?"#fff":d.data.color)
    .attr("font-size",d=>d.depth<=1?"11.5px":"10.5px").attr("font-weight",600)
    .attr("font-family","Segoe UI,Arial,sans-serif").attr("pointer-events","none")
    .text(d=>sg(d.data.name));

  ndE.filter(d=>d.depth>0).append("text")
    .attr("x",17).attr("y",9).attr("class","ntxt")
    .attr("font-size",d=>d.depth===1?"10.5px":"10px").attr("font-weight",400)
    .attr("font-family","Segoe UI,Arial,sans-serif").attr("pointer-events","none")
    .text(d=>tr(fn(d.data.name),24));

  ndE.append("text").attr("class","ind")
    .attr("x",NW-13).attr("y",1).attr("dominant-baseline","middle")
    .attr("text-anchor","middle").attr("font-size","13px").attr("font-weight",300)
    .attr("font-family","Segoe UI,Arial,sans-serif").attr("pointer-events","none").attr("opacity",.5);

  const ndM=ndE.merge(nd);
  ndM.transition().duration(DUR).ease(d3.easeCubicInOut)
    .attr("transform",d=>`translate(${d.y},${d.x})`).attr("opacity",1);
  ndM.select(".ind")
    .attr("fill",d=>d.data.color||"#888")
    .attr("opacity",d=>(d.children||d._children)?.55:0)
    .text(d=>d.children?"−":"+");

  nd.exit().transition().duration(DUR).ease(d3.easeCubicInOut)
    .attr("transform",`translate(${src.y},${src.x})`).attr("opacity",0).remove();
  nodes.forEach(d=>{d.x0=d.x;d.y0=d.y;});
}

function hcurve([x1,y1],[x2,y2]){return d3.linkHorizontal()({source:[x1,y1],target:[x2,y2]});}
function sg(n){const i=n.indexOf(" · ");return i>-1?n.substring(0,i):n;}
function fn(n){const i=n.indexOf(" · ");return i>-1?n.substring(i+3):"";}
function tr(s,l){return s.length>l?s.substring(0,l-1)+"…":s;}

function toggle(d){
  if(d.children){d._children=d.children;d.children=null;}
  else{d.children=d._children;d._children=null;}
  update(d);
}
function expandAll(d){if(d._children){d.children=d._children;d._children=null;}if(d.children)d.children.forEach(expandAll);}
function collapseAll(d){if(d.children){d._children=d.children;d._children.forEach(collapseAll);d.children=null;}}

function showP(d){
  const path=d.ancestors().reverse().map(a=>sg(a.data.name)).join(" › ");
  document.getElementById("pnl-path").textContent=path;
  document.getElementById("pnl-name").textContent=d.data.name;
  document.getElementById("pnl-desc").textContent=d.data.short||d.data.desc||"—";
  const k=(d.children||d._children||[]).length;
  document.getElementById("pnl-sub").textContent=k?`${d.children?"▼ collassa":"▶ espandi"} (${k} sotto-team)`:"";
  const pnl=document.getElementById("panel");
  pnl.style.borderColor=d.data.color||"#E2E8F0";
  pnl.style.opacity="1";
}
function hideP(){document.getElementById("panel").style.opacity="0";}
function resetView(){
  svg.transition().duration(600).ease(d3.easeCubicInOut)
    .call(zoom.transform,d3.zoomIdentity.translate(90,GH()/2).scale(0.95));
}

function openSidebar(d){
  const path=d.ancestors().reverse().map(a=>sg(a.data.name)).join(" › ");
  const sidebar=document.getElementById("sidebar");
  const wrap=document.getElementById("svg-wrap");
  document.getElementById("sb-path").textContent=path;
  document.getElementById("sb-sigla").textContent=sg(d.data.name);
  document.getElementById("sb-name").textContent=fn(d.data.name)||"";
  const rawDesc = d.data.desc||"Nessuna descrizione disponibile.";
  document.getElementById("sb-desc").innerHTML = rawDesc.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  document.getElementById("sb-accent").style.background=d.data.color||"#CBD5E0";
  sidebar.style.borderLeftColor=d.data.color||"#E2E8F0";
  const k=(d.children||d._children||[]).length;
  document.getElementById("sb-sub").textContent=k?`${k} sotto-${k===1?"team":"team"} collegat${k===1?"o":"i"}`:"Nodo foglia";
  sidebar.classList.add("open");
  wrap.classList.add("sb-open");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("svg-wrap").classList.remove("sb-open");
}

document.getElementById("sb-close").onclick=closeSidebar;

document.getElementById("b-in").onclick=()=>svg.transition().duration(260).call(zoom.scaleBy,1.4);
document.getElementById("b-out").onclick=()=>svg.transition().duration(260).call(zoom.scaleBy,.72);
document.getElementById("b-rst").onclick=resetView;
document.getElementById("b-exp").onclick=()=>{expandAll(root);update(root);};
document.getElementById("b-col").onclick=()=>{collapseAll(root);update(root);};

update(root);
setTimeout(resetView,120);
</script>
</body>
</html>
